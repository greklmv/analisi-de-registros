name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.5.0
          
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --console --add-data "src;src" --add-data "assets;assets" --add-data "plantilla informe registros.docx;." --add-data "pk's señales.docx;." --add-data "ESPECIFICACIONS_TECNIQUES_FGC.md;." --copy-metadata streamlit --collect-all streamlit --collect-all plotly --collect-all pdfplumber launcher.py
          
      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --console --add-data "src:src" --add-data "assets:assets" --add-data "plantilla informe registros.docx:." --add-data "pk's señales.docx:." --add-data "ESPECIFICACIONS_TECNIQUES_FGC.md:." --copy-metadata streamlit --collect-all streamlit --collect-all plotly --collect-all pdfplumber launcher.py

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\launcher\* -DestinationPath Analista_OTMR_Pro_Windows.zip
          
      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/launcher
          zip -r ../../Analista_OTMR_Pro_macOS.zip .
          cd ../..

      - name: Upload to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: Analista_OTMR_Pro_${{ runner.os }}
          path: Analista_OTMR_Pro_*.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Analista_OTMR_Pro_Windows.zip
            Analista_OTMR_Pro_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
