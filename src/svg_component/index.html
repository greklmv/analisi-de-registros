<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background-color: transparent; font-family: sans-serif; }
        #container { 
            width: calc(100% - 3rem); /* account for padding */
            background: #ffffff; 
            padding: 2rem 1.5rem; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            margin-bottom: 2rem; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
        }
        svg { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        const Streamlit = {
            setComponentReady: function() {
                window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
            },
            setFrameHeight: function(height) {
                window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height }, "*");
            },
            setComponentValue: function(value) {
                window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value, dataType: "json" }, "*");
            }
        };

        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                const args = event.data.args;
                const container = document.getElementById("container");
                container.innerHTML = args.svg_code;
                
                const links = container.querySelectorAll("a");
                links.forEach(a => {
                    a.onclick = (e) => {
                        e.preventDefault();
                        const href = a.getAttribute("href");
                        if (href && href.includes("station_origin=")) {
                            const params = new URLSearchParams(href.split('?')[1]);
                            Streamlit.setComponentValue(params.get("station_origin"));
                        } else if (href === "/") {
                            Streamlit.setComponentValue("RESET");
                        }
                    };
                });
                Streamlit.setFrameHeight(args.height || 270);
            }
        });

        Streamlit.setComponentReady();
    </script>
</body>
</html>
